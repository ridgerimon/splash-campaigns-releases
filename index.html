<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Splash Campaigns | ريدج ريمون</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #2563eb;
            --dark-color: #1e293b;
            --bg-light: #f8fafc;
            --text-gray: #64748b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            line-height: 1.6;
            background-color: #fff;
            color: var(--dark-color);
        }

        /* Hero Section */
        .hero {
            padding: 80px 20px;
            text-align: center;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
        }

        .hero h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: var(--primary-color);
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-gray);
            max-width: 600px;
            margin: 0 auto 30px;
        }

        /* Partners Section */
        .partners {
            padding: 60px 20px;
            background-color: #fff;
            text-align: center;
        }

        .partners h2 {
            font-size: 1.8rem;
            margin-bottom: 40px;
            position: relative;
        }

        .partners h2::after {
            content: '';
            display: block;
            width: 50px;
            height: 4px;
            background: var(--primary-color);
            margin: 10px auto;
            border-radius: 2px;
        }

        .logos-grid {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 40px;
            max-width: 1100px;
            margin: 0 auto;
        }

        .logo-item {
            flex: 1 1 150px;
            max-width: 180px;
            display: flex;
            justify-content: center;
        }

        .logo-item img {
            max-width: 100%;
            height: auto;
            filter: grayscale(100%);
            opacity: 0.6;
            transition: all 0.4s ease;
        }

        .logo-item img:hover {
            filter: grayscale(0%);
            opacity: 1;
            transform: translateY(-5px);
        }

        /* Features/Assets Preview */
        .features {
            padding: 80px 20px;
            background-color: var(--bg-light);
        }

        .features-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .feature-card {
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .feature-card img {
            width: 100%;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        footer {
            padding: 40px;
            text-align: center;
            background: var(--dark-color);
            color: white;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }

            .logos-grid {
                gap: 20px;
            }

            .logo-item {
                flex: 1 1 120px;
            }
        }
    </style>
</head>

<body>

    <section class="hero">
        <h1>Splash Campaigns</h1>
        <p>المنصة المتكاملة لإدارة حملاتك الإعلانية واستهداف عملائك بدقة واحترافية.</p>
    </section>

    <section class="partners">
        <h2>الشركات المتعاقدة معنا</h2>
        <div class="logos-grid">
            <div class="logo-item">
                <img src="assets/company/logo1.png" alt="Company 1">
            </div>
            <div class="logo-item">
                <img src="assets/company/logo2.png" alt="Company 2">
            </div>
            <div class="logo-item">
                <img src="assets/company/logo3.png" alt="Company 3">
            </div>
            <div class="logo-item">
                <img src="assets/company/logo4.png" alt="Company 4">
            </div>
        </div>
    </section>

    <section class="features">
        <div class="features-grid">
            <div class="feature-card">
                <img src="assets/dashboard.png" alt="لوحة التحكم">
                <h3>لوحة تحكم ذكية</h3>
            </div>
            <div class="feature-card">
                <img src="assets/bulk-sender.png" alt="الإرسال الجماعي">
                <h3>إرسال جماعي سريع</h3>
            </div>
            <div class="feature-card">
                <img src="assets/contacts.png" alt="إدارة الجهات">
                <h3>إدارة جهات الاتصال</h3>
            </div>
        </div>
    </section>

    <footer>
        <p>جميع الحقوق محفوظة &copy; 2026 - **ريدج ريمون (Ridge Rimon)**</p>
    </footer>

</body>

</html>
